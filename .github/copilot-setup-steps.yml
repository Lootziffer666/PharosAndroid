# Pre-build setup for GitHub Copilot coding agent.
# These steps run BEFORE the firewall is enabled, so they can download
# dependencies from dl.google.com and other blocked domains.
#
# Required allowlist entries (if not using this file):
#   - dl.google.com        (Google Maven — AGP, AndroidX, Material, etc.)
#   - maven.google.com     (redirects to dl.google.com)
#   - jitpack.io           (optional — not currently used)
#
# Already accessible (no allowlist needed):
#   - services.gradle.org  (Gradle wrapper distribution)
#   - plugins.gradle.org   (Gradle Plugin Portal)
#   - repo1.maven.org      (Maven Central — OkHttp, Gson, Coroutines, etc.)

steps:
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: "17"
      distribution: "temurin"
      cache: gradle

  - name: Create local.properties
    run: cp local.properties.example local.properties

  - name: Pre-cache Gradle dependencies
    run: |
      chmod +x gradlew
      ./gradlew assembleDebug --no-daemon
