name: Build APK & Desktop

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          cp local.properties.example local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharos-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-desktop:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: copy local.properties.example local.properties
        shell: cmd

      - name: Build desktop uber JAR
        run: .\gradlew.bat :desktop:packageUberJarForCurrentOS --no-daemon
        shell: cmd

      - name: Run sync module tests
        run: .\gradlew.bat :core:sync:test --no-daemon
        shell: cmd

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharos-desktop-windows
          path: desktop/build/compose/jars/*.jar
          if-no-files-found: error
